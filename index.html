<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pin Plan - Cycle Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #d32f2f;
            --accent-red: #ff5252;
            --dark-bg: #0a0a0a;
            --panel-bg: #1a1a1a;
            --border-color: #333333;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(211, 47, 47, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(211, 47, 47, 0.02) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        /* Grid Background */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(211, 47, 47, 0.05) 25%, rgba(211, 47, 47, 0.05) 26%, transparent 27%, transparent 74%, rgba(211, 47, 47, 0.05) 75%, rgba(211, 47, 47, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(211, 47, 47, 0.05) 25%, rgba(211, 47, 47, 0.05) 26%, transparent 27%, transparent 74%, rgba(211, 47, 47, 0.05) 75%, rgba(211, 47, 47, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--panel-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-red);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-red);
        }

        /* HEADER */
        header {
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
            border-bottom: 2px solid var(--primary-red);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(211, 47, 47, 0.15);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--primary-red);
            text-shadow: 0 0 10px rgba(211, 47, 47, 0.3);
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary-red), var(--accent-red));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #fff;
            border: 2px solid var(--accent-red);
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.4);
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-btn:hover {
            border-color: var(--primary-red);
            color: var(--primary-red);
            box-shadow: inset 0 0 10px rgba(211, 47, 47, 0.2);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--primary-red), var(--accent-red));
            border-color: var(--primary-red);
            color: #fff;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.5);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* PANEL */
        .panel {
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-red), transparent);
        }

        .panel:hover {
            border-color: var(--primary-red);
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.2);
        }

        .panel-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            color: var(--primary-red);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .panel-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-box:hover {
            border-color: var(--primary-red);
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.2);
            transform: translateY(-3px);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--primary-red);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(211, 47, 47, 0.3);
        }

        .stat-unit {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* FORM */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: #0a0a0a;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.3);
        }

        /* BUTTONS */
        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-red), var(--accent-red));
            color: #fff;
            border: 2px solid var(--primary-red);
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 0 25px rgba(211, 47, 47, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary-red);
            border: 2px solid var(--primary-red);
        }

        .btn-secondary:hover {
            background: rgba(211, 47, 47, 0.1);
            box-shadow: inset 0 0 10px rgba(211, 47, 47, 0.2);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-in-out;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
            border: 2px solid var(--primary-red);
            border-radius: 8px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(211, 47, 47, 0.3);
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            color: var(--primary-red);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .modal-footer button {
            flex: 1;
        }

        /* TABLE */
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .table th {
            background: rgba(211, 47, 47, 0.1);
            border-bottom: 2px solid var(--primary-red);
            padding: 1rem;
            text-align: left;
            font-weight: bold;
            color: var(--primary-red);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .table tr:hover {
            background: rgba(211, 47, 47, 0.05);
        }

        /* PROGRESS BAR */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-red), var(--accent-red));
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(211, 47, 47, 0.5);
        }

        /* INSIGHTS */
        .insight {
            background: rgba(211, 47, 47, 0.1);
            border-left: 3px solid var(--primary-red);
            border-radius: 4px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .insight-title {
            font-weight: bold;
            color: var(--primary-red);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .insight-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .steroid-item {
            background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .steroid-item:hover {
            border-color: var(--primary-red);
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.2);
        }

        .steroid-name {
            font-weight: bold;
            color: var(--primary-red);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .steroid-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 2rem 0;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-buttons {
                width: 100%;
                flex-direction: column;
            }

            .nav-btn {
                width: 100%;
                text-align: center;
            }

            .container {
                padding: 1rem;
            }

            .panel {
                padding: 1rem;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">PP</div>
                Pin Plan Cycles
            </div>
            <div class="nav-buttons">
                <button class="nav-btn active" onclick="switchSection('cycles')">Cycles</button>
                <button class="nav-btn" onclick="switchSection('compounds')">Compounds</button>
                <button class="nav-btn" onclick="switchSection('hormones')">Hormones</button>
                <button class="nav-btn" onclick="switchSection('logs')">Logs</button>
                <button class="nav-btn" onclick="switchSection('settings')">Settings</button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- CYCLES SECTION -->
        <section id="cycles" class="section active">
            <div class="panel">
                <div class="panel-title">Active Cycle</div>
                <div id="activeCycleInfo" style="margin-bottom: 2rem;"></div>
                <button class="btn btn-primary" onclick="openModal('cycleModal')">Create New Cycle</button>
            </div>

            <div class="grid" id="cyclesGrid"></div>

            <div class="panel">
                <div class="panel-title">Recommendations</div>
                <div id="suggestionsContainer"></div>
            </div>
        </section>

        <!-- COMPOUNDS SECTION -->
        <section id="compounds" class="section">
            <div class="panel">
                <div class="panel-title">Steroid Compounds</div>
                <div class="panel-subtitle">Select compounds for your cycle</div>
                <div id="compoundsContainer"></div>
            </div>
        </section>

        <!-- HORMONES SECTION -->
        <section id="hormones" class="section">
            <div class="grid">
                <div class="stat-box">
                    <div class="stat-label">Testosterone</div>
                    <div class="stat-value" id="testValue">0</div>
                    <div class="stat-unit">ng/dL</div>
                    <input type="range" min="0" max="1500" value="0" style="width: 100%; margin-top: 1rem;" onchange="updateTestosterone(this.value)">
                </div>
                <div class="stat-box">
                    <div class="stat-label">Estrogen</div>
                    <div class="stat-value" id="estValue">0</div>
                    <div class="stat-unit">pg/mL</div>
                    <input type="range" min="0" max="100" value="0" style="width: 100%; margin-top: 1rem;" onchange="updateEstrogen(this.value)">
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">Hormone Levels Chart</div>
                <div class="chart-container">
                    <canvas id="hormoneChart"></canvas>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">AI Recommendations</div>
                <div id="hormoneRecommendations"></div>
            </div>
        </section>

        <!-- LOGS SECTION -->
        <section id="logs" class="section">
            <div class="panel">
                <div class="panel-title">Dosage Log</div>
                <button class="btn btn-primary" onclick="openModal('logModal')" style="margin-bottom: 1rem;">Add Dosage Entry</button>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Compound</th>
                            <th>Dose</th>
                            <th>Route</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="logsTableBody">
                    </tbody>
                </table>
            </div>
        </section>

        <!-- SETTINGS SECTION -->
        <section id="settings" class="section">
            <div class="panel">
                <div class="panel-title">Settings</div>
                <div class="form-group">
                    <button class="btn btn-primary" onclick="exportData()">Export Data</button>
                </div>
                <div class="form-group">
                    <button class="btn btn-secondary" onclick="document.getElementById('importInput').click()">Import Data</button>
                    <input type="file" id="importInput" accept=".json" style="display: none;" onchange="importData(event)">
                </div>
                <div class="form-group">
                    <button class="btn btn-secondary" onclick="if(confirm('Clear all data?')) { clearAllData(); }">Clear All Data</button>
                </div>
            </div>
        </section>
    </div>

    <!-- MODALS -->
    
    <!-- Create Cycle Modal -->
    <div id="cycleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Create New Cycle</div>
            <div class="form-group">
                <label>Cycle Name</label>
                <input type="text" id="cycleName" placeholder="e.g., Test + Tren Bulk">
            </div>
            <div class="form-group">
                <label>Duration (Weeks)</label>
                <input type="number" id="cycleDuration" placeholder="12" value="12">
            </div>
            <div class="form-group">
                <label>Goal</label>
                <select id="cycleGoal">
                    <option value="bulk">Bulking</option>
                    <option value="cut">Cutting</option>
                    <option value="recomp">Recomposition</option>
                    <option value="strength">Strength</option>
                </select>
            </div>
            <div class="form-group">
                <label>Compounds</label>
                <textarea id="cycleCompounds" placeholder="List compounds..." rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="cycleNotes" placeholder="Additional notes..." rows="3"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveCycle()">Create Cycle</button>
                <button class="btn btn-secondary" onclick="closeModal('cycleModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="logModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Dosage Entry</div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="logDate">
            </div>
            <div class="form-group">
                <label>Compound</label>
                <select id="logCompound">
                    <option>Testosterone Enanthate</option>
                    <option>Testosterone Propionate</option>
                    <option>Trenbolone Acetate</option>
                    <option>Nandrolone Decanoate</option>
                    <option>Boldenone Undecylenate</option>
                    <option>Stanozolol</option>
                    <option>Oxandrolone</option>
                    <option>Oxymethalone</option>
                    <option>Turinabol</option>
                    <option>Masteron</option>
                </select>
            </div>
            <div class="form-group">
                <label>Dose (mg)</label>
                <input type="number" id="logDose" placeholder="500">
            </div>
            <div class="form-group">
                <label>Route</label>
                <select id="logRoute">
                    <option>Intramuscular</option>
                    <option>Subcutaneous</option>
                    <option>Oral</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="logNotes" placeholder="..." rows="2"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveLog()">Save</button>
                <button class="btn btn-secondary" onclick="closeModal('logModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const STEROIDS = [
            { name: 'Testosterone Enanthate', halfLife: '4-5 days', estrogenic: 'High', androgenic: 'High' },
            { name: 'Testosterone Propionate', halfLife: '2-3 days', estrogenic: 'High', androgenic: 'High' },
            { name: 'Trenbolone Acetate', halfLife: '2-3 days', estrogenic: 'None', androgenic: 'Very High' },
            { name: 'Nandrolone Decanoate', halfLife: '15 days', estrogenic: 'Moderate', androgenic: 'Moderate' },
            { name: 'Boldenone Undecylenate', halfLife: '14 days', estrogenic: 'Moderate', androgenic: 'Moderate' },
            { name: 'Stanozolol', halfLife: '9 hours', estrogenic: 'Low', androgenic: 'High' },
            { name: 'Oxandrolone', halfLife: '9 hours', estrogenic: 'None', androgenic: 'Low' },
            { name: 'Oxymethalone', halfLife: '16 hours', estrogenic: 'Moderate', androgenic: 'Very High' },
            { name: 'Turinabol', halfLife: '16 hours', estrogenic: 'Low', androgenic: 'High' },
            { name: 'Masteron', halfLife: '2-3 days', estrogenic: 'None', androgenic: 'High' }
        ];

        class CycleTracker {
            constructor() {
                this.cycles = JSON.parse(localStorage.getItem('cycles')) || [];
                this.logs = JSON.parse(localStorage.getItem('logs')) || [];
                this.hormones = JSON.parse(localStorage.getItem('hormones')) || {};
                this.chart = null;
                this.init();
            }

            init() {
                this.setDefaultDate();
                this.render();
            }

            setDefaultDate() {
                document.getElementById('logDate').valueAsDate = new Date();
            }

            render() {
                this.renderCycles();
                this.renderCompounds();
                this.renderHormones();
                this.renderLogs();
                this.renderSuggestions();
            }

            renderCycles() {
                const active = this.cycles.find(c => new Date(c.endDate) > new Date());
                const container = document.getElementById('activeCycleInfo');
                
                if (active) {
                    const daysRemaining = Math.ceil((new Date(active.endDate) - new Date()) / (1000 * 60 * 60 * 24));
                    container.innerHTML = `
                        <div style="background: rgba(211, 47, 47, 0.1); border: 2px solid var(--primary-red); border-radius: 6px; padding: 1.5rem;">
                            <div style="color: var(--primary-red); font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem;">${active.name}</div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; color: var(--text-secondary); margin-bottom: 1rem;">
                                <div><strong>Goal:</strong> ${active.goal}</div>
                                <div><strong>Duration:</strong> ${active.duration}w</div>
                                <div><strong>Days Left:</strong> ${daysRemaining}</div>
                                <div><strong>Progress:</strong> ${Math.round((1 - daysRemaining / (active.duration * 7)) * 100)}%</div>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${Math.round((1 - daysRemaining / (active.duration * 7)) * 100)}%"></div>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = '<div style="color: var(--text-secondary);">No active cycle</div>';
                }

                const grid = document.getElementById('cyclesGrid');
                if (this.cycles.length === 0) {
                    grid.innerHTML = '<div style="color: var(--text-secondary);">No cycles created</div>';
                    return;
                }

                grid.innerHTML = this.cycles.map(c => `
                    <div class="stat-box">
                        <div class="stat-label">${c.name}</div>
                        <div style="color: var(--primary-red); font-size: 0.95rem; margin: 0.5rem 0;">${c.goal.toUpperCase()}</div>
                        <div style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1rem;">${c.duration} weeks</div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                            ${c.compounds}
                        </div>
                    </div>
                `).join('');
            }

            renderCompounds() {
                const container = document.getElementById('compoundsContainer');
                container.innerHTML = STEROIDS.map(s => `
                    <div class="steroid-item">
                        <div class="steroid-name">${s.name}</div>
                        <div class="steroid-info">
                            <div><strong>Half-life:</strong> ${s.halfLife}</div>
                            <div><strong>Estrogenic:</strong> ${s.estrogenic}</div>
                            <div><strong>Androgenic:</strong> ${s.androgenic}</div>
                        </div>
                    </div>
                `).join('');
            }

            renderHormones() {
                const test = this.hormones.test || 0;
                const est = this.hormones.est || 0;
                
                document.getElementById('testValue').textContent = test;
                document.getElementById('estValue').textContent = est;

                this.createHormoneChart();
                this.generateHormoneRecommendations();
            }

            renderLogs() {
                const tbody = document.getElementById('logsTableBody');
                if (this.logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-secondary);">No logs yet</td></tr>';
                    return;
                }

                tbody.innerHTML = this.logs
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .map(log => `
                        <tr>
                            <td>${log.date}</td>
                            <td>${log.compound}</td>
                            <td>${log.dose}mg</td>
                            <td>${log.route}</td>
                            <td>${log.notes || '-'}</td>
                        </tr>
                    `).join('');
            }

            renderSuggestions() {
                const container = document.getElementById('suggestionsContainer');
                const suggestions = this.generateSuggestions();
                
                if (suggestions.length === 0) {
                    container.innerHTML = '<div style="color: var(--text-secondary);">Log more data for recommendations</div>';
                    return;
                }

                container.innerHTML = suggestions.map(s => `
                    <div class="insight">
                        <div class="insight-title">${s.title}</div>
                        <div class="insight-text">${s.text}</div>
                    </div>
                `).join('');
            }

            generateSuggestions() {
                const suggestions = [];
                const active = this.cycles.find(c => new Date(c.endDate) > new Date());
                
                if (!active) {
                    suggestions.push({
                        title: 'No Active Cycle',
                        text: 'Create a new cycle to start tracking your compounds.'
                    });
                }

                if (this.hormones.test && this.hormones.test > 1000) {
                    suggestions.push({
                        title: 'High Testosterone',
                        text: 'Consider AI dosing to manage aromatization.'
                    });
                }

                if (this.hormones.est && this.hormones.est > 40) {
                    suggestions.push({
                        title: 'Elevated Estrogen',
                        text: 'Aromatase inhibitor dosing may be needed.'
                    });
                }

                if (this.logs.length < 3) {
                    suggestions.push({
                        title: 'Build Log History',
                        text: 'Log more dosages for accurate tracking.'
                    });
                }

                return suggestions;
            }

            generateHormoneRecommendations() {
                const container = document.getElementById('hormoneRecommendations');
                const test = this.hormones.test || 0;
                const est = this.hormones.est || 0;

                let recommendations = [];

                if (test < 300) {
                    recommendations.push('Testosterone critically low');
                } else if (test < 600) {
                    recommendations.push('Testosterone below optimal range');
                } else if (test > 1200) {
                    recommendations.push('High testosterone - monitor estrogen carefully');
                } else {
                    recommendations.push('Testosterone in therapeutic range');
                }

                if (est < 20) {
                    recommendations.push('Estrogen may be too low - joint issues possible');
                } else if (est < 40) {
                    recommendations.push('Estrogen in ideal range');
                } else if (est < 60) {
                    recommendations.push('Estrogen slightly elevated - monitor closely');
                } else {
                    recommendations.push('Estrogen too high - increase AI dose');
                }

                container.innerHTML = recommendations.map(r => `
                    <div class="insight">
                        <div class="insight-text">${r}</div>
                    </div>
                `).join('');
            }

            createHormoneChart() {
                const ctx = document.getElementById('hormoneChart');
                if (!ctx) return;

                if (this.chart) this.chart.destroy();

                this.chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: this.logs.map(l => l.date).slice(-10),
                        datasets: [
                            {
                                label: 'Testosterone (ng/dL)',
                                data: Array(Math.min(this.logs.length, 10)).fill(this.hormones.test || 0),
                                borderColor: '#d32f2f',
                                backgroundColor: 'rgba(211, 47, 47, 0.1)',
                                borderWidth: 2,
                                tension: 0.4
                            },
                            {
                                label: 'Estrogen (pg/mL)',
                                data: Array(Math.min(this.logs.length, 10)).fill(this.hormones.est || 0),
                                borderColor: '#ff5252',
                                backgroundColor: 'rgba(255, 82, 82, 0.1)',
                                borderWidth: 2,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: '#e0e0e0' } }
                        },
                        scales: {
                            y: { grid: { color: '#333' }, ticks: { color: '#b0b0b0' } },
                            x: { grid: { display: false }, ticks: { color: '#b0b0b0' } }
                        }
                    }
                });
            }

            saveCycle() {
                const cycle = {
                    id: Date.now(),
                    name: document.getElementById('cycleName').value,
                    duration: parseInt(document.getElementById('cycleDuration').value),
                    goal: document.getElementById('cycleGoal').value,
                    compounds: document.getElementById('cycleCompounds').value,
                    notes: document.getElementById('cycleNotes').value,
                    startDate: new Date().toISOString(),
                    endDate: new Date(Date.now() + parseInt(document.getElementById('cycleDuration').value) * 7 * 24 * 60 * 60 * 1000).toISOString()
                };

                this.cycles.push(cycle);
                this.save();
                closeModal('cycleModal');
                alert('Cycle created');
            }

            saveLog() {
                const log = {
                    id: Date.now(),
                    date: document.getElementById('logDate').value,
                    compound: document.getElementById('logCompound').value,
                    dose: parseInt(document.getElementById('logDose').value),
                    route: document.getElementById('logRoute').value,
                    notes: document.getElementById('logNotes').value
                };

                this.logs.push(log);
                this.save();
                closeModal('logModal');
                alert('Entry saved');
            }

            save() {
                localStorage.setItem('cycles', JSON.stringify(this.cycles));
                localStorage.setItem('logs', JSON.stringify(this.logs));
                localStorage.setItem('hormones', JSON.stringify(this.hormones));
                this.render();
            }

            export() {
                const data = { cycles: this.cycles, logs: this.logs, hormones: this.hormones };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `cycle-tracker-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            }

            import(data) {
                if (data.cycles) this.cycles = data.cycles;
                if (data.logs) this.logs = data.logs;
                if (data.hormones) this.hormones = data.hormones;
                this.save();
            }
        }

        let tracker = new CycleTracker();

        function switchSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function saveCycle() {
            tracker.saveCycle();
        }

        function saveLog() {
            tracker.saveLog();
        }

        function updateTestosterone(value) {
            tracker.hormones.test = parseInt(value);
            tracker.save();
        }

        function updateEstrogen(value) {
            tracker.hormones.est = parseInt(value);
            tracker.save();
        }

        function exportData() {
            tracker.export();
        }

        function importData(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    tracker.import(data);
                    alert('Data imported');
                } catch (err) {
                    alert('Error importing');
                }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            tracker.cycles = [];
            tracker.logs = [];
            tracker.hormones = {};
            tracker.save();
            alert('Data cleared');
        }

        // Close modal on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
